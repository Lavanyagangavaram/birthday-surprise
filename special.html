<!DOCTYPE html> <html> <head> <title>Special Day ❤️</title> <style> body { margin: 0; padding: 0; text-align: center; background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffd3e0); font-family: 'Segoe UI', sans-serif; overflow: hidden; } h1 { margin-top: 80px; color: white; font-size: 42px; text-shadow: 0 0 10px rgba(255,255,255,0.8); } p { color: white; font-size: 20px; text-shadow: 0 0 5px rgba(0,0,0,0.3); } button { padding: 14px 28px; font-size: 18px; background: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.7); } #surprise { display: none; margin-top: 30px; } .float { position: absolute; font-size: 28px; animation: floatUp linear infinite; } @keyframes floatUp { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } } </style> </head> <body> <h1>🎉 Happy Birthday & Happy Anniversary ❤️</h1> <p>This day is double special because of you 💖</p> <button onclick="showSurprise()">Open Your Surprise 🎁</button> <div id="surprise"> <p>On your birthday, I celebrate YOU 💕</p> <p>On our anniversary, I celebrate US ❤️</p> <p>You are my happiness, my strength, my everything ✨</p> <p>Nuvvu na life lo vachaka everything became beautiful 💖</p> <h2>Forever with You ❤️</h2> </div> <!-- YOUR SONG --> <audio id="music"> <source src="song.mp3" type="audio/mpeg"> </audio> <script> function showSurprise() { document.getElementById("surprise").style.display = "block"; document.getElementById("music").play(); } // Floating Hearts + Flowers const symbols = ["❤️","🌸","💖"]; setInterval(() => { let item = document.createElement("div"); item.innerHTML = symbols[Math.floor(Math.random() * symbols.length)]; item.classList.add("float"); item.style.left = Math.random() * 100 + "vw"; item.style.animationDuration = (10 + Math.random() * 5) + "s"; document.body.appendChild(item); setTimeout(() => { item.remove(); }, 15000); }, 600); </script> </body> </html>
